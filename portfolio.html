<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Francesco Di Rienzo — Network & Security Engineer</title>
  <meta name="description" content="Francesco Di Rienzo — Linux & Network Systems Administrator and Cybersecurity Specialist. Portfolio." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- background layers -->
  <canvas id="net-canvas"></canvas>
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>

  <!-- NAV -->
  <header class="nav">
    <div class="wrap">
      <a href="#top" class="brand">
        <span class="dot"></span>
        francesco.di_rienzo<span class="cursor">_</span>
      </a>
      <nav class="nav-links">
        <a href="#about" id="nav-about"></a>
        <a href="#experience" id="nav-exp"></a>
        <a href="#skills" id="nav-skills"></a>
        <a href="#certs" id="nav-certs"></a>
        <a href="#contact" id="nav-contact"></a>
      </nav>
      <div class="nav-right">
        <div class="lang-toggle">
          <button data-lang="en">EN</button>
          <button data-lang="it">IT</button>
        </div>
        <a class="btn btn-cv cv-link" href="assets/CV_DiRienzo.pdf" target="_blank" rel="noopener">CV</a>
        <button class="nav-burger" id="burger" aria-label="Menu"><span></span></button>
      </div>
    </div>
  </header>
  <div class="mobile-menu" id="mm"></div>

  <main class="page" id="top">
    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="wrap hero-grid">
        <div class="hero-left">
          <span class="hero-status"><span class="live"></span><span id="hero-status"></span></span>
          <h1 id="hero-h1"></h1>
          <div class="hero-role">
            <span class="prompt">&gt;</span> <span class="typed" id="typed"></span><span class="tw-cursor"></span>
          </div>
          <p class="hero-bio" id="hero-bio"></p>
          <div class="hero-cta">
            <a class="btn btn-primary" id="cta1" href="#contact"></a>
            <a class="btn" id="cta2" href="#experience"></a>
            <a class="btn cv-link" id="cv-btn" href="assets/CV_DiRienzo.pdf" target="_blank" rel="noopener"></a>
          </div>
        </div>

        <div class="id-frame">
          <span class="id-corner tl"></span><span class="id-corner tr"></span>
          <span class="id-corner bl"></span><span class="id-corner br"></span>
          <span class="scan"></span>
          <div class="photo">
            <img id="profile-img" src="assets/profile.webp" alt="Francesco Di Rienzo" />
            <div id="photo-fallback" style="display:none; position:absolute; inset:0; place-items:center; background:repeating-linear-gradient(135deg,#0d121a,#0d121a 10px,#0f141c 10px,#0f141c 20px); font-family:var(--font-mono); color:var(--text-faint); font-size:12px; text-align:center; padding:20px;">
              [ drop&nbsp;profile.webp&nbsp;in&nbsp;/assets ]
            </div>
          </div>
          <div class="id-tag">
            <div>
              <div class="id-name">F. DI RIENZO</div>
              <div>ID · FDR-2001</div>
            </div>
            <div class="id-meta">
              <div><b>SEC</b> CLEARED</div>
              <div>ROME · IT</div>
            </div>
          </div>
        </div>
      </div>
      <div class="scroll-cue"><span>scroll</span><span class="bar"></span></div>
    </section>

    <!-- STATS -->
    <section class="stats" id="stats" style="padding-top:0;padding-bottom:0;">
      <div class="wrap">
        <div class="stats-grid">
          <div class="stat"><div class="num">0</div><div class="lbl"></div></div>
          <div class="stat"><div class="num">0</div><div class="lbl"></div></div>
          <div class="stat"><div class="num">0</div><div class="lbl"></div></div>
          <div class="stat"><div class="num">0</div><div class="lbl"></div></div>
        </div>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="about">
      <div class="wrap">
        <div class="section-head reveal">
          <span class="eyebrow" id="about-eyebrow"></span>
          <h2 id="about-title"></h2>
          <p class="lead" id="about-lead"></p>
        </div>
        <div class="about-grid">
          <div class="about-copy reveal reveal-d1">
            <div id="about-copy"></div>
            <div class="about-tags" id="about-tags"></div>
          </div>
          <div class="reveal reveal-d2">
            <div class="terminal">
              <div class="bar">
                <span class="tdot"></span><span class="tdot"></span><span class="tdot g"></span>
                <span class="title" id="term-title"></span>
              </div>
              <div class="body" id="term-body"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- EXPERIENCE -->
    <section id="experience">
      <div class="wrap">
        <div class="section-head reveal">
          <span class="eyebrow" id="exp-eyebrow"></span>
          <h2 id="exp-title"></h2>
          <p class="lead" id="exp-lead"></p>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <!-- SKILLS -->
    <section id="skills">
      <div class="wrap">
        <div class="section-head reveal">
          <span class="eyebrow" id="skills-eyebrow"></span>
          <h2 id="skills-title"></h2>
          <p class="lead" id="skills-lead"></p>
        </div>
        <div class="skills-grid" id="skills-grid"></div>
      </div>
    </section>

    <!-- CERTS -->
    <section id="certs">
      <div class="wrap">
        <div class="section-head reveal">
          <span class="eyebrow" id="certs-eyebrow"></span>
          <h2 id="certs-title"></h2>
          <p class="lead" id="certs-lead"></p>
        </div>
        <div class="cert-grid" id="cert-grid"></div>
      </div>
    </section>

    <!-- LANGUAGES + SOFT -->
    <section id="languages">
      <div class="wrap">
        <div class="section-head reveal">
          <span class="eyebrow" id="lang-eyebrow"></span>
          <h2 id="lang-title"></h2>
          <p class="lead" id="lang-lead"></p>
        </div>
        <div class="lang-soft">
          <div class="reveal reveal-d1">
            <h3 style="font-family:var(--font-mono);font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:26px;" id="lang-subtitle"></h3>
            <div class="lang-list" id="lang-list"></div>
          </div>
          <div class="reveal reveal-d2">
            <h3 style="font-family:var(--font-mono);font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:26px;" id="soft-title"></h3>
            <div class="soft-grid" id="soft-grid"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="contact" id="contact">
      <div class="wrap">
        <div class="contact-card reveal">
          <div class="corner-grid"></div>
          <span class="eyebrow" id="contact-eyebrow" style="justify-content:center;"></span>
          <h2 id="contact-title" style="margin-top:18px;"></h2>
          <p class="sub" id="contact-sub"></p>
          <div class="contact-actions">
            <a class="btn btn-primary" id="contact-cta1" href="#"></a>
            <a class="btn" id="contact-cta2" href="#" target="_blank" rel="noopener"></a>
          </div>
          <div class="contact-meta" id="contact-meta"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="wrap">
      <span>© <span id="year"></span> Francesco Di Rienzo · <span id="ft-tag"></span></span>
      <div class="ft-links">
        <a href="https://github.com/france5cogreen" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/francesco-di-rienzo" target="_blank" rel="noopener">LinkedIn</a>
        <span style="color:var(--accent-1);">● <span id="ft-rights"></span></span>
      </div>
    </div>
  </footer>

  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
  <script src="assets/app.js"></script>
</body>
</html>
